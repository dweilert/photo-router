<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>photo-router</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ------------------------------------------------------------------ */
    /* Design: industrial/utilitarian darkroom — monospaced, high-contrast  */
    /* ------------------------------------------------------------------ */
    :root {
      --bg:         #0e0e0e;
      --surface:    #181818;
      --border:     #2a2a2a;
      --border-hi:  #404040;
      --text:       #d4d0c8;
      --text-dim:   #666;
      --text-hi:    #f0ece0;
      --accent:     #c8a951;        /* darkroom amber */
      --accent-dim: #7a6530;
      --green:      #5a9e6f;
      --red:        #9e4f4f;
      --blue:       #4f7a9e;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo span { color: var(--text-dim); font-weight: 400; }
    .version { font-size: 11px; color: var(--text-dim); }

    /* ---- Layout ---- */
    .shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 57px);
    }

    /* ---- Sidebar ---- */
    aside {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* Config display */
    .config-row {
      margin-bottom: 6px;
    }
    .config-key {
      color: var(--text-dim);
      font-size: 11px;
    }
    .config-val {
      color: var(--text-hi);
      word-break: break-all;
      font-size: 11px;
    }
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .badge-warn  { background: var(--accent-dim); color: var(--accent); }
    .badge-ok    { background: #2a3d2e; color: var(--green); }
    .badge-err   { background: #3d2a2a; color: var(--red); }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border: 1px solid var(--border-hi);
      background: var(--surface);
      color: var(--text-hi);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      margin-bottom: 8px;
    }
    .btn::before { content: '▶ '; color: var(--accent); font-size: 10px; }
    .btn:hover   { border-color: var(--accent); color: var(--accent); }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-execute {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-execute::before { content: '⚡ '; }
    .btn-execute:hover {
      background: #3d2a2a;
      border-color: #c06060;
      color: #e08080;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 10px;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }
    .stat-box.has-errors .stat-num { color: var(--red); }
    .stat-box.has-queue  .stat-num { color: var(--blue); }

    /* ---- Main panel ---- */
    main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .toolbar-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
    }
    .filter-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1f1a0e;
    }

    .ops-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* Operation table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #141414;
      border-bottom: 1px solid var(--border-hi);
      padding: 8px 16px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: #1c1c1c; }
    td {
      padding: 7px 16px;
      font-size: 11px;
      vertical-align: middle;
    }
    .op-kind {
      white-space: nowrap;
    }
    .kind-tag {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 2px;
    }
    .kind-COPY_RAW_TO_ARCHIVE { background: #1a2d1a; color: var(--green); }
    .kind-COPY_RAW_TO_QUEUE   { background: #1a2233; color: var(--blue); }
    .kind-DELETE_SOURCE_RAW   { background: #2d1a1a; color: var(--red); }
    .kind-SKIP_JPEG           { background: #222; color: var(--text-dim); }

    .path-cell {
      font-size: 10px;
      color: var(--text-dim);
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .path-cell .fname {
      color: var(--text);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    .dot-pending { background: var(--border-hi); }
    .dot-ok      { background: var(--green); }
    .dot-err     { background: var(--red); }

    /* Log / message area */
    .log-area {
      border-top: 1px solid var(--border);
      background: #0a0a0a;
      padding: 10px 20px;
      font-size: 11px;
      color: var(--text-dim);
      min-height: 48px;
      max-height: 100px;
      overflow-y: auto;
    }
    .log-line { margin-bottom: 2px; }
    .log-line.ok  { color: var(--green); }
    .log-line.err { color: var(--red); }
    .log-line.info { color: var(--accent); }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 10px;
    }
    .empty-icon { font-size: 36px; opacity: 0.3; }
    .empty-msg  { font-size: 12px; letter-spacing: 0.05em; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">photo<span>-</span>router</div>
  <div class="version">v0.1.0</div>
  <div id="dry-run-badge" class="badge badge-warn" style="margin-left:auto">DRY RUN</div>
</header>

<div class="shell">
  <!-- ---------------------------------------------------------------- -->
  <!-- Sidebar                                                           -->
  <!-- ---------------------------------------------------------------- -->
  <aside>

    <div>
      <div class="section-label">Configuration</div>
      <div id="config-panel">
        <div class="config-key">loading…</div>
      </div>
    </div>

    <div>
      <div class="section-label">Actions</div>
      <button class="btn" id="btn-scan" onclick="doScan()">Scan source dirs</button>
      <button class="btn btn-execute" id="btn-execute" onclick="doExecute()" disabled>
        Execute routing
      </button>
      <div style="font-size:10px;color:var(--text-dim);line-height:1.5;margin-top:4px">
        Set <code style="color:var(--accent)">dry_run: false</code> in config.yaml
        to enable execute.
      </div>
    </div>

    <div>
      <div class="section-label">Summary</div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-box"><div class="stat-num" id="s-pairs">—</div><div class="stat-lbl">PAIRS</div></div>
        <div class="stat-box"><div class="stat-num" id="s-archive">—</div><div class="stat-lbl">→ ARCHIVE</div></div>
        <div class="stat-box has-queue"><div class="stat-num" id="s-queue">—</div><div class="stat-lbl">→ QUEUE</div></div>
        <div class="stat-box"><div class="stat-num" id="s-jpegs">—</div><div class="stat-lbl">JPEGS KEPT</div></div>
        <div class="stat-box"><div class="stat-num" id="s-orphan-j">—</div><div class="stat-lbl">ORPHAN JPG</div></div>
        <div class="stat-box has-errors"><div class="stat-num" id="s-failed">—</div><div class="stat-lbl">FAILED</div></div>
      </div>
    </div>

  </aside>

  <!-- ---------------------------------------------------------------- -->
  <!-- Main panel                                                        -->
  <!-- ---------------------------------------------------------------- -->
  <main>
    <div class="toolbar">
      <span class="toolbar-label" id="toolbar-label">Ready — run a scan to begin</span>
      <button class="filter-btn active" data-filter="ALL" onclick="setFilter('ALL', this)">ALL</button>
      <button class="filter-btn" data-filter="COPY_RAW_TO_ARCHIVE" onclick="setFilter('COPY_RAW_TO_ARCHIVE', this)">ARCHIVE</button>
      <button class="filter-btn" data-filter="COPY_RAW_TO_QUEUE"   onclick="setFilter('COPY_RAW_TO_QUEUE', this)">QUEUE</button>
      <button class="filter-btn" data-filter="DELETE_SOURCE_RAW"   onclick="setFilter('DELETE_SOURCE_RAW', this)">DELETE</button>
      <button class="filter-btn" data-filter="SKIP_JPEG"           onclick="setFilter('SKIP_JPEG', this)">SKIP</button>
    </div>

    <div class="ops-container" id="ops-container">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-msg">No scan results yet</div>
      </div>
    </div>

    <div class="log-area" id="log-area"></div>
  </main>
</div>

<script>
// -------------------------------------------------------------------------
// State
// -------------------------------------------------------------------------
let _ops = [];
let _filter = 'ALL';
let _dryRun = true;

// -------------------------------------------------------------------------
// Bootstrap
// -------------------------------------------------------------------------
async function init() {
  try {
    const cfg = await api('GET', '/api/config');
    _dryRun = cfg.dry_run;

    const badge = document.getElementById('dry-run-badge');
    if (!cfg.dry_run) {
      badge.textContent = 'LIVE MODE';
      badge.className = 'badge badge-err';
      document.getElementById('btn-execute').disabled = false;
    }

    const panel = document.getElementById('config-panel');
    panel.innerHTML = [
      row('source dirs', cfg.source_dirs.join('<br>')),
      row('raw archive', cfg.raw_archive),
      row('piece2 queue', cfg.piece2_queue),
      row('raw exts', cfg.raw_extensions.join(', ')),
      row('jpeg exts', cfg.jpeg_extensions.join(', ')),
      row('workers', cfg.workers),
    ].join('');
  } catch (e) {
    log('Config load failed: ' + e.message, 'err');
  }
}

function row(k, v) {
  return `<div class="config-row"><div class="config-key">${k}</div><div class="config-val">${v}</div></div>`;
}

// -------------------------------------------------------------------------
// Scan
// -------------------------------------------------------------------------
async function doScan() {
  setWorking('btn-scan', true);
  log('Scanning source directories…', 'info');
  try {
    const data = await api('POST', '/api/scan');
    _ops = data.operations;
    updateStats(data.summary);
    renderOps();
    const s = data.summary;
    log(`Scan complete — ${s.pairs_found} pairs, ${s.orphan_raws} orphan RAWs, ${s.orphan_jpegs} orphan JPEGs`, 'ok');
    if (s.scan_errors && s.scan_errors.length) {
      s.scan_errors.forEach(e => log('ERROR: ' + e, 'err'));
    }
    document.getElementById('toolbar-label').textContent =
      `${data.operations.length} operations planned (dry_run=${data.dry_run})`;
  } catch (e) {
    log('Scan failed: ' + e.message, 'err');
  } finally {
    setWorking('btn-scan', false);
  }
}

// -------------------------------------------------------------------------
// Execute
// -------------------------------------------------------------------------
async function doExecute() {
  if (!confirm('Execute routing operations? This will move files on disk.')) return;
  setWorking('btn-execute', true);
  log('Executing routing operations…', 'info');
  try {
    const data = await api('POST', '/api/execute');
    _ops = data.operations;
    updateStats(data.summary);
    renderOps();
    const f = data.summary.failed;
    if (f === 0) {
      log(`Execute complete — all operations succeeded.`, 'ok');
    } else {
      log(`Execute complete — ${f} operation(s) failed. Check results below.`, 'err');
    }
    document.getElementById('toolbar-label').textContent =
      `Execution complete — ${data.summary.failed} failed`;
  } catch (e) {
    log('Execute failed: ' + e.message, 'err');
  } finally {
    setWorking('btn-execute', false);
  }
}

// -------------------------------------------------------------------------
// Render
// -------------------------------------------------------------------------
function renderOps() {
  const container = document.getElementById('ops-container');
  const visible = _filter === 'ALL' ? _ops : _ops.filter(o => o.kind === _filter);

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⬡</div>
      <div class="empty-msg">No operations match filter "${_filter}"</div>
    </div>`;
    return;
  }

  const rows = visible.map(op => {
    const dot = op.success === true  ? 'dot-ok'
              : op.success === false ? 'dot-err'
              : 'dot-pending';
    const status = op.success === true  ? 'OK'
                 : op.success === false ? 'FAIL'
                 : 'pending';
    return `<tr title="${op.error || ''}">
      <td class="op-kind"><span class="kind-tag kind-${op.kind}">${op.kind.replace(/_/g,' ')}</span></td>
      <td class="path-cell">${fmtPath(op.source)}</td>
      <td class="path-cell">${op.destination ? fmtPath(op.destination) : '<span style="color:var(--border-hi)">—</span>'}</td>
      <td><span class="status-dot ${dot}"></span>${status}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `<table>
    <thead><tr>
      <th>Operation</th><th>Source</th><th>Destination</th><th>Status</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function fmtPath(p) {
  if (!p) return '';
  const parts = p.split('/');
  const fname = parts.pop();
  const dir   = parts.join('/') + '/';
  return `<span class="path-cell"><span style="color:var(--text-dim)">${dir}</span><span class="fname">${fname}</span></span>`;
}

function updateStats(s) {
  document.getElementById('s-pairs').textContent    = s.pairs_found ?? '—';
  document.getElementById('s-archive').textContent  = s.copies_to_archive ?? '—';
  document.getElementById('s-queue').textContent    = s.copies_to_queue ?? '—';
  document.getElementById('s-jpegs').textContent    = s.skipped_jpegs ?? '—';
  document.getElementById('s-orphan-j').textContent = s.orphan_jpegs ?? '—';
  document.getElementById('s-failed').textContent   = s.failed ?? '—';
}

// -------------------------------------------------------------------------
// Filter
// -------------------------------------------------------------------------
function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOps();
}

// -------------------------------------------------------------------------
// Utilities
// -------------------------------------------------------------------------
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function log(msg, type = '') {
  const area = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  line.textContent = `[${ts}] ${msg}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function setWorking(btnId, working) {
  const btn = document.getElementById(btnId);
  btn.disabled = working;
  if (working) {
    btn._orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>working…';
  } else {
    if (btn._orig) btn.innerHTML = btn._orig;
    // Re-disable execute if still in dry-run mode
    if (btnId === 'btn-execute' && _dryRun) btn.disabled = true;
  }
}

init();
</script>
</body>
</html>
